name: Discord Notifier

on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'スロット番号 (1=朝, 2=昼, 3=夜)'
        required: true
        default: '1'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "22" ]; then echo "slot=1" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "03" ]; then echo "slot=2" >> $GITHUB_OUTPUT
            else echo "slot=3" >> $GITHUB_OUTPUT
            fi
          fi
      - name: Send to Discord
        run: python x_discord_notify.py --slot ${{ steps.slot.outputs.slot }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
